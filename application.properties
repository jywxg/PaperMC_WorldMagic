# ===== WorldMagic v2.0.0 Multi-Protocol Configuration =====
# Place this file in: plugins/application.properties

# ===== Basic Settings =====
domain=example.com
email=admin@example.com

# ===== Enabled Protocols =====
# Comma-separated list: hysteria2, vmess-ws, anytls, tuic, argo
enabled-protocols=hysteria2,vmess-ws,anytls

# ===== Hysteria2 Settings (UDP/QUIC) =====
hy2-port=8443
hy2-password=your-hy2-password-here
hy2-up-mbps=100
hy2-down-mbps=100
hy2-obfs-password=
hy2-sni=itunes.apple.com

# ===== Vmess-WS Settings (WebSocket + TLS) =====
vmess-port=443
vmess-uuid=bf000d23-0752-40b4-affe-68f7707a9661
vmess-path=/vmess

# ===== AnyTLS Settings (TLS Padding) =====
anytls-port=8444
anytls-password=your-anytls-password
anytls-sni=www.apple.com

# ===== Argo Tunnel Settings (Cloudflare) =====
argo-enabled=false
argo-token=your-cloudflare-tunnel-token
argo-hostname=your-domain.com

# ===== Tuic Settings (QUIC Legacy) =====
tuic-port=25565
tuic-uuid=2584b733-9095-4bec-a7d5-62b473540f7a
tuic-password=tuiC.Pwd
tuic-version=1.6.5

# ===== SSHX Web Terminal =====
sshx-enabled=true

# ===== General Settings =====
remarks-prefix=vevc
self-sign-cert=true
