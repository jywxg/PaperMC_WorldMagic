name: Build WorldMagic Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read  # 仅读取代码权限即可，因为不推送到分支
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -B

    # 方案二核心步骤：上传编译文件作为 Artifact
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: world-magic-build-result # 在页面显示的下载包名称
        path: target/world-magic.jar     # 编译产物的实际路径
        retention-days: 30              # 文件保留天数，过期自动清理，不占用仓库空间
